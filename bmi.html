<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8""")/>>
    <title>BMI - Kalkulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        #container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .kontener-obrazow {
            position: relative;
            margin: 20px auto;
            width: 300px; 
            height: 160px;
            overflow: hidden;
        }

        .obraz-bazowy {
            width: 100%;
            display: block;
        }

        #strzalka {
            position: absolute;
            bottom: 5px;
            left: 50%;
            width: 40px;
            transform-origin: bottom center; 
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateX(-50%) rotate(-90deg);
        }

        .formularz input {
            margin: 8px 0;
            padding: 10px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        #bmi { font-size: 22px; font-weight: bold; color: #003366; margin: 15px 0 5px; }
        #opis { font-size: 18px; color: #555; margin: 0 0 15px; }

        .wynik-figura img {
            height: 180px;
        }
    </style>
</head>
<body>

<div id="container"> 
    <h2>Kalkulator BMI</h2>

    <div class="kontener-obrazow">
        <img src="custom bmi.png" class="obraz-bazowy" alt="Skala">
        <img src="strzalka.png" id="strzalka" alt="Wskaźnik">
    </div>

    <div class="formularz">
        <input type="number" id="wzrost" placeholder="Wzrost (cm)">
        <input type="number" id="waga" placeholder="Waga (kg)">
        <button onclick="oblicz()">OBLICZ WYNIK</button>
    </div>

    <div id="wynik-sekcja">
        <p id="bmi"></p>
        <p id="opis"></p>
        <div class="wynik-figura">
            <img id="figura" src="prawidlowa.png" style="display:none;">
        </div>
    </div>
</div>

<script>
    function oblicz() {
        let wzrost = parseFloat(document.getElementById("wzrost").value);
        let waga = parseFloat(document.getElementById("waga").value);
        let bmiText = document.getElementById("bmi");
        let opisText = document.getElementById("opis");
        let figura = document.getElementById("figura");
        let strzalka = document.getElementById("strzalka");

        if (!wzrost || !waga) return;

        let bmi = waga / Math.pow(wzrost/100, 2);
        bmi = Math.round(bmi * 10) / 10;

        bmiText.textContent = "Twoje BMI: " + bmi;
        figura.style.display = "inline-block";

        let opis = "";
        let obraz = "prawidlowa.png";
        let kat = 0;

        // POPRAWIONA LOGIKA DOPASOWANA DO GRAFIKI
        if (bmi <= 15) {
            opis = "Wygłodzony";
            kat = -78;
        } else if (bmi <= 17.4) {
            opis = "Wychudzony";
            kat = -56;
        } else if (bmi <= 18.5) {
            opis = "Niedowaga";
            kat = -34;
        } else if (bmi <= 24.9) {
            opis = "Prawidłowy";
            kat = -12;
            obraz = "prawidlowa.png";
        } else if (bmi <= 29.9) {
            opis = "Nadwaga";
            kat = 12;
            obraz = "nadwaga.png";
        } else if (bmi <= 34.9) {
            opis = "1 stopień otyłości";
            kat = 34;
            obraz = "otylosc.png";
        } else if (bmi <= 39.9) {
            opis = "2 stopień otyłości";
            kat = 56;
            obraz = "otylosc.png";
        } else {
            opis = "Otyłość skrajna";
            kat = 78;
            obraz = "otylosc_skrajna.png";
        }

        opisText.textContent = opis;
        figura.src = obraz;
        strzalka.style.transform = "translateX(-50%) rotate(" + kat + "deg)";
    }
</script>

</body>
</html>
