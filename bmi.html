<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8""")/>>
    <title>BMI - Kalkulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        #container {
            width: 350px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .kontener-obrazow {
            position: relative;
            margin: 20px 0;
            height: 150px; /* dopasowane do półkola */
        }

        .obraz-bazowy {
            width: 100%;
            max-width: 300px;
        }

        #strzalka {
            position: absolute;
            bottom: 10px; /* ustawienie u podstawy skali */
            left: 50%;
            width: 40px;
            transform-origin: bottom center; /* obrót u podstawy strzałki */
            transition: transform 1s;
            transform: translateX(-50%) rotate(-90deg);
        }

        .formularz input {
            margin: 5px 0;
            padding: 8px;
            width: 90%;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            background: navy;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 90%;
        }

        #bmi, #opis {
            margin: 10px 0;
            font-weight: bold;
        }

        .wynik img {
            margin-top: 15px;
            height: 200px;
        }
    </style>
    <script>
        function oblicz() {
            let wzrost = parseFloat(document.getElementById("wzrost").value);
            let waga = parseFloat(document.getElementById("waga").value);
            let bmiText = document.getElementById("bmi");
            let opisText = document.getElementById("opis");
            let figura = document.getElementById("figura");
            let strzalka = document.getElementById("strzalka");

            if (!wzrost || !waga || wzrost <= 0 || waga <= 0) {
                alert("Proszę wprowadzić poprawne wartości.");
                return;
            }

            let wzrostM = wzrost / 100;
            let bmi = waga / (wzrostM * wzrostM);
            bmi = Math.round(bmi * 10) / 10;

            bmiText.textContent = "Twoje BMI: " + bmi;

            let opis = "";
            let obraz = "prawidlowa.png";
            let kat = 0;

            // Logika i kąty dopasowane do 8 kolorów na custom bmi.png
            if (bmi <= 15) {
                opis = "wygłodzony";
                kat = -78;
            } else if (bmi <= 17.4) {
                opis = "wychudzony";
                kat = -56;
            } else if (bmi <= 18.5) {
                opis = "niedowagę";
                kat = -34;
            } else if (bmi <= 24.9) {
                opis = "prawidłowy";
                kat = -12;
                obraz = "prawidlowa.png";
            } else if (bmi <= 29.9) {
                opis = "nadwagę";
                kat = 12; // Żółty segment
                obraz = "nadwaga.png";
            } else if (bmi <= 34.9) {
                opis = "1 stopień otyłości";
                kat = 34; // Jasnopomarańczowy
                obraz = "otylosc.png";
            } else if (bmi <= 39.9) {
                opis = "2 stopień otyłości";
                kat = 56; // Ciemnopomarańczowy
                obraz = "otylosc.png";
            } else {
                opis = "otyłość skrajną";
                kat = 78; // Czerwony
                obraz = "otylosc_skrajna.png";
            }

            opisText.textContent = "Pacjent ma " + opis + " wskaźnik masy ciała";
            figura.src = obraz;
            strzalka.style.transform = "translateX(-50%) rotate(" + kat + "deg)";
        }
    </script>
</head>
<body>
    <div id="container"> 
        <h2>BMI - Kalkulator</h2>

        <div class="kontener-obrazow">
            <img src="custom bmi.png" class="obraz-bazowy" alt="Skala BMI">
            <img src="strzalka.png" id="strzalka" alt="Strzałka">
        </div>

        <div class="formularz">
            <input type="number" id="wzrost" placeholder="Wzrost (cm)">
            <input type="number" id="waga" placeholder="Waga (kg)">
            <button onclick="oblicz()">Oblicz BMI</button>
        </div>

        <p id="bmi"></p>
        <p id="opis"></p>

        <div class="wynik">
            <img id="figura" src="prawidlowa.png" alt="Figura BMI">
        </div>
    </div>
</body>
</html>
