```html
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BMI</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

#container {
    width: 320px;
    margin: auto;
}

h2 {
    margin-top: 20px;
}

.formularz input {
    margin: 5px;
    padding: 6px;
    width: 85%;
}

button {
    margin-top: 10px;
    padding: 8px 15px;
    background: navy;
    color: white;
    border: none;
    cursor: pointer;
}

.kontener-obrazow {
    position: relative;
    margin: 20px 0;
}

.obraz-bazowy {
    width: 220px;
}

.obraz-nad {
    position: absolute;
    top: 65px;
    left: 95px;
    width: 40px;
    transform-origin: center center;
    transition: 1s;
}

.wynik img {
    margin-top: 20px;
    width: 120px;
}
</style>

</head>

<body>

<div id="container"> 
    <h2>Wskaźnik masy ciała BMI</h2>

    <div class="kontener-obrazow">
        <img src="skala.png" class="obraz-bazowy">
        <img src="strzalka.png" id="strzalka" class="obraz-nad">
    </div>

    <div class="formularz">
        <input type="text" id="imie" placeholder="Imię"><br>
        <input type="text" id="nazwisko" placeholder="Nazwisko"><br>
        <input type="number" id="wiek" placeholder="Wiek"><br>
        <input type="number" id="wzrost" placeholder="Wzrost (cm)"><br>
        <input type="number" id="waga" placeholder="Waga (kg)"><br>

        <button onclick="oblicz()">Oblicz BMI</button>
    </div>

    <p id="bmi"></p>
    <p id="opis"></p>

    <div class="wynik">
        <img id="figura" src="">
    </div>

</div>

<script>
function oblicz() {
    let imie = document.getElementById('imie').value;
    let nazwisko = document.getElementById('nazwisko').value;
    let wiek = document.getElementById('wiek').value;

    let waga = parseFloat(document.getElementById('waga').value);
    let wzrost = parseFloat(document.getElementById('wzrost').value) / 100;

    let bmi = waga / (wzrost * wzrost);
    bmi = bmi.toFixed(2);

    document.getElementById('bmi').innerHTML = "BMI = " + bmi;

    let opis = "";
    let img = "";

    if (bmi <= 15) {
        opis = "jest wygłodzony";
        img = "niedowaga.png";
    } else if (bmi <= 17.4) {
        opis = "jest wychudzony";
        img = "niedowaga.png";
    } else if (bmi <= 18.5) {
        opis = "ma niedowagę";
        img = "niedowaga.png";
    } else if (bmi <= 24.9) {
        opis = "ma prawidłowy wskaźnik masy ciała";
        img = "prawidlowa.png";
    } else if (bmi <= 29.9) {
        opis = "ma nadwagę";
        img = "nadwaga.png";
    } else if (bmi <= 34.9) {
        opis = "ma 1 stopień otyłości";
        img = "otylosc.png";
    } else if (bmi <= 39.9) {
        opis = "ma 2 stopień otyłości";
        img = "otylosc.png";
    } else {
        opis = "ma 3 stopień otyłości";
        img = "otylosc_skrajna.png";
    }

    document.getElementById('opis').innerHTML =
        imie + " " + nazwisko + " w wieku " + wiek +
        " lat, wzroście " + (wzrost * 100) + " cm i wadze " +
        waga + " kg " + opis;

    document.getElementById('figura').src = img;

    rotateArrow(bmi);
}

function rotateArrow(bmi) {
    let rotacja = bmi * 3 - 90;
    document.getElementById('strzalka').style.transform =
        "rotate(" + rotacja + "deg)";
}
</script>

</body>
</html>
