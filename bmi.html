<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8""")/>>
    <title>BMI - Kalkulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            padding: 20px;
        }

        #container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .kontener-obrazow {
            position: relative;
            margin: 20px auto;
            width: 300px; 
            height: 150px; /* Wysokość połowy koła */
        }

        .obraz-bazowy {
            width: 100%;
            display: block;
        }

        #strzalka {
            position: absolute;
            /* Pozycjonowanie na dole na środku skali */
            bottom: 5px; 
            left: 50%;
            width: 6px; /* Szerokość samej igły */
            height: 80px; /* Długość igły */
            background: black; /* Jeśli nie masz pliku, to będzie linia */
            
            /* KLUCZOWE: Obrot wokół dolnej krawędzi igły */
            transform-origin: bottom center; 
            
            transition: transform 0.8s ease-out;
            /* Startuje z lewej strony (-90 stopni) */
            transform: translateX(-50%) rotate(-90deg);
        }

        /* Stylizacja formularza */
        .formularz input {
            margin: 8px 0;
            padding: 10px;
            width: 90%;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 95%;
        }

        #bmi { font-size: 24px; font-weight: bold; margin: 15px 0 5px; }
        #opis { font-size: 18px; margin-bottom: 15px; }
        .figura-img { height: 200px; }
    </style>
</head>
<body>

<div id="container"> 
    <h2>Kalkulator BMI</h2>

    <div class="kontener-obrazow">
        <img src="custom bmi.png" class="obraz-bazowy" alt="Skala">
        <!-- Jeśli masz plik strzalka.png, zamień <div> na <img> i usuń background w CSS -->
        <img src="strzalka.png" id="strzalka" alt="Wskazówka">
    </div>

    <div class="formularz">
        <input type="number" id="wzrost" placeholder="Wzrost (cm)">
        <input type="number" id="waga" placeholder="Waga (kg)">
        <button onclick="oblicz()">OBLICZ BMI</button>
    </div>

    <div id="wynik-sekcja">
        <p id="bmi"></p>
        <p id="opis"></p>
        <img id="figura" class="figura-img" src="" style="display:none;">
    </div>
</div>

<script>
    function oblicz() {
        let wzrost = parseFloat(document.getElementById("wzrost").value);
        let waga = parseFloat(document.getElementById("waga").value);
        
        if (!wzrost || !waga) return;

        let bmi = waga / Math.pow(wzrost/100, 2);
        bmi = Math.round(bmi * 10) / 10;

        document.getElementById("bmi").textContent = "Twoje BMI: " + bmi;
        let figura = document.getElementById("figura");
        figura.style.display = "inline-block";

        let opis = "";
        let obraz = "";
        let kat = 0;

        // KALIBRACJA KĄTÓW (8 segmentów co ~22.5 stopnia)
        // Zakres od -90 (lewo) do +90 (prawo)
        if (bmi <= 15) {
            opis = "Wygłodzony";
            kat = -78; // Środek błękitnego
        } else if (bmi <= 17.4) {
            opis = "Wychudzony";
            kat = -56; // Środek jasnoniebieskiego
        } else if (bmi <= 18.5) {
            opis = "Niedowaga";
            kat = -34; // Środek ciemnoniebieskiego
        } else if (bmi <= 24.9) {
            opis = "Prawidłowy";
            kat = -11; // Środek beżowego
            obraz = "prawidlowa.png";
        } else if (bmi <= 29.9) {
            opis = "Nadwaga";
            kat = 11; // Środek żółtego
            obraz = "nadwaga.png";
        } else if (bmi <= 34.9) {
            opis = "1 stopień otyłości";
            kat = 34; // Środek jasnopomarańczowego
            obraz = "otylosc.png";
        } else if (bmi <= 39.9) {
            opis = "2 stopień otyłości";
            kat = 56; // Środek ciemnopomarańczowego
            obraz = "otylosc.png";
        } else {
            opis = "Otyłość skrajna";
            kat = 78; // Środek czerwonego
            obraz = "otylosc_skrajna.png";
        }

        document.getElementById("opis").textContent = opis;
        if(obraz) figura.src = obraz;
        
        // Zastosowanie obrotu
        document.getElementById("strzalka").style.transform = "translateX(-50%) rotate(" + kat + "deg)";
    }
</script>

</body>
</html>
