<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator rezystora (5 pasków)</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #2f3b3b;
  color: white;
  text-align: center;
}

h1 { margin-top: 30px; }

.resistor {
  width: 500px;
  height: 120px;
  background: #d9c69a;
  border-radius: 30px;
  margin: 40px auto;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wire {
  width: 200px;
  height: 8px;
  background: gray;
  position: absolute;
  top: 50%;
}

.wire.left { left: -200px; }
.wire.right { right: -200px; }

.band {
  width: 20px;
  height: 100px;
  margin: 0 8px;
  cursor: pointer;
  border: 2px solid black; /* poprawka dla białego */
}

.dropdown {
  position: absolute;
  background: white;
  border: 1px solid #ccc;
  display: none;
  flex-direction: column;
  z-index: 10;
  color:black;
}

.dropdown div {
  padding: 5px 10px;
  cursor: pointer;
}

.dropdown div:hover {
  background: #eee;
}

.result {
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

</style>
</head>

<body>

<h1>Kalkulator kodu paskowego rezystora (5 pasków)</h1>
<p>Kliknij pasek aby wybrać kolor</p>

<div class="resistor">
  <div class="wire left"></div>

  <div class="band" data-index="0"></div>
  <div class="band" data-index="1"></div>
  <div class="band" data-index="2"></div>
  <div class="band" data-index="3"></div>
  <div class="band" data-index="4"></div>

  <div class="wire right"></div>
</div>

<div class="dropdown" id="dropdown"></div>

<div class="result" id="result">Rezystancja: 0 Ω</div>

<script>

// poprawione kolory
const colors = [
  {name:'czarny', value:0, color:'#000000'},
  {name:'brązowy', value:1, color:'#8B4513'},
  {name:'czerwony', value:2, color:'#FF0000'},
  {name:'pomarańczowy', value:3, color:'#FF8C00'},
  {name:'żółty', value:4, color:'#FFD700'},
  {name:'zielony', value:5, color:'#008000'},
  {name:'niebieski', value:6, color:'#0000FF'},
  {name:'fioletowy', value:7, color:'#800080'},
  {name:'szary', value:8, color:'#808080'},
  {name:'biały', value:9, color:'#FFFFFF'}
];

let bands = [1,0,0,1,0];

const bandElements = document.querySelectorAll('.band');
const dropdown = document.getElementById('dropdown');

function render() {
  bandElements.forEach((el, i) => {
    const colorObj = colors.find(c => c.value === bands[i]);
    el.style.background = colorObj.color;
  });

  let value = (bands[0]*100 + bands[1]*10 + bands[2]) * Math.pow(10, bands[3]);

  let display;

  if(value >= 1000000){
    display = (value/1000000) + " MΩ";
  }
  else if(value >= 1000){
    display = (value/1000) + " kΩ";
  }
  else{
    display = value + " Ω";
  }

  document.getElementById('result').innerText = "Rezystancja: " + display;
}

bandElements.forEach(el => {
  el.addEventListener('click', (e) => {
    const index = parseInt(el.dataset.index);
    showDropdown(e.target, index);
  });
});

function showDropdown(target, index) {
  dropdown.innerHTML = '';

  colors.forEach(c => {
    const item = document.createElement('div');
    item.textContent = c.name;

    item.onclick = () => {
      bands[index] = c.value;
      dropdown.style.display = 'none';
      render();
    };

    dropdown.appendChild(item);
  });

  const rect = target.getBoundingClientRect();
  dropdown.style.left = rect.left + 'px';
  dropdown.style.top = (rect.bottom + window.scrollY) + 'px';
  dropdown.style.display = 'flex';
}

window.addEventListener('click', (e) => {
  if (!e.target.classList.contains('band')) {
    dropdown.style.display = 'none';
  }
});

render();

</script>

</body>
</html>
