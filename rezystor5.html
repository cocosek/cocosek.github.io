<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<title>Kalkulator kodów rezystorów</title>

<style>

body{
    font-family: Arial;
    background:#eaeaea;
    margin:0;
}

h1{
    text-align:center;
    padding:20px;
}

.container{
    width:1000px;
    margin:auto;
    display:flex;
    gap:30px;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    flex:1;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

select{
    padding:5px;
    margin:5px;
}

button{
    padding:8px 15px;
    margin-top:10px;
}

#wynik{
    font-size:22px;
    margin-top:20px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:20px;
}

td,th{
    border:1px solid #ccc;
    padding:5px;
    text-align:center;
}

.color{
    height:20px;
}

</style>

</head>

<body>

<h1>Kalkulator kodów rezystorów</h1>

<div class="container">

<!-- LEWA STRONA -->
<div class="box">

<h2>Kod czteropaskowy</h2>

<table>
<tr>
<th>Kolor</th>
<th>Cyfra</th>
</tr>

<tr>
<td class="color" style="background:black"></td>
<td>0</td>
</tr>

<tr>
<td class="color" style="background:brown"></td>
<td>1</td>
</tr>

<tr>
<td class="color" style="background:red"></td>
<td>2</td>
</tr>

<tr>
<td class="color" style="background:orange"></td>
<td>3</td>
</tr>

<tr>
<td class="color" style="background:yellow"></td>
<td>4</td>
</tr>

<tr>
<td class="color" style="background:green"></td>
<td>5</td>
</tr>

<tr>
<td class="color" style="background:blue"></td>
<td>6</td>
</tr>

<tr>
<td class="color" style="background:violet"></td>
<td>7</td>
</tr>

<tr>
<td class="color" style="background:gray"></td>
<td>8</td>
</tr>

<tr>
<td class="color" style="background:white"></td>
<td>9</td>
</tr>

</table>

</div>

<!-- PRAWA STRONA -->
<div class="box">

<h2>Kalkulator (5 pasków)</h2>

<p>Wybierz kolory:</p>

<select id="p1">
<option value="0">Czarny</option>
<option value="1">Brązowy</option>
<option value="2">Czerwony</option>
<option value="3">Pomarańczowy</option>
<option value="4">Żółty</option>
<option value="5">Zielony</option>
<option value="6">Niebieski</option>
<option value="7">Fioletowy</option>
<option value="8">Szary</option>
<option value="9">Biały</option>
</select>

<select id="p2">
<option value="0">Czarny</option>
<option value="1">Brązowy</option>
<option value="2">Czerwony</option>
<option value="3">Pomarańczowy</option>
<option value="4">Żółty</option>
<option value="5">Zielony</option>
<option value="6">Niebieski</option>
<option value="7">Fioletowy</option>
<option value="8">Szary</option>
<option value="9">Biały</option>
</select>

<select id="p3">
<option value="0">Czarny</option>
<option value="1">Brązowy</option>
<option value="2">Czerwony</option>
<option value="3">Pomarańczowy</option>
<option value="4">Żółty</option>
<option value="5">Zielony</option>
<option value="6">Niebieski</option>
<option value="7">Fioletowy</option>
<option value="8">Szary</option>
<option value="9">Biały</option>
</select>

<select id="mult">
<option value="1">x1</option>
<option value="10">x10</option>
<option value="100">x100</option>
<option value="1000">x1000</option>
</select>

<br>

<button onclick="oblicz()">Oblicz</button>

<div id="wynik"></div>

</div>

</div>

<script src="rezystor5.js"></script>

</body>
</html>
