<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator rezystora (5 pasków)</title>

<style>
body{
  background:#2f3b3b;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{ margin-top:20px; }

.resistor{
  width:500px;
  height:120px;
  background:#d9c69a;
  border-radius:30px;
  margin:40px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.wire{
  width:200px;
  height:8px;
  background:black;
  position:absolute;
  top:50%;
}
.wire.left{ left:-200px; }
.wire.right{ right:-200px; }

.band{
  width:20px;
  height:100px;
  margin:0 6px;
  border:2px solid black;
  cursor:pointer;
}

.dropdown{
  position:absolute;
  background:white;
  color:black;
  display:none;
  flex-direction:column;
  border:1px solid #ccc;
  z-index:10;
}

.dropdown div{
  padding:5px;
  cursor:pointer;
}
.dropdown div:hover{
  background:#eee;
}

.result{
  font-size:26px;
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Kalkulator kodu paskowego (5 pasków)</h1>

<div class="resistor">
  <div class="wire left"></div>

  <div class="band" data-index="0"></div>
  <div class="band" data-index="1"></div>
  <div class="band" data-index="2"></div>
  <div class="band" data-index="3"></div>
  <div class="band" data-index="4"></div>

  <div class="wire right"></div>
</div>

<div class="dropdown" id="dropdown"></div>

<div class="result" id="result">Rezystancja: 0 Ω</div>

<script>

// cyfry
const digitColors = [
  {name:'czarny', value:0, color:'#000'},
  {name:'brązowy', value:1, color:'#8B4513'},
  {name:'czerwony', value:2, color:'red'},
  {name:'pomarańczowy', value:3, color:'orange'},
  {name:'żółty', value:4, color:'yellow'},
  {name:'zielony', value:5, color:'green'},
  {name:'niebieski', value:6, color:'blue'},
  {name:'fioletowy', value:7, color:'purple'},
  {name:'szary', value:8, color:'gray'},
  {name:'biały', value:9, color:'white'}
];

// mnożnik
const multiplierColors = [
  {name:'czarny', value:1, color:'#000'},
  {name:'brązowy', value:10, color:'#8B4513'},
  {name:'czerwony', value:100, color:'red'},
  {name:'pomarańczowy', value:1000, color:'orange'},
  {name:'żółty', value:10000, color:'yellow'},
  {name:'zielony', value:100000, color:'green'},
  {name:'niebieski', value:1000000, color:'blue'}
];

// tolerancja
const toleranceColors = [
  {name:'brązowy', value:1, color:'#8B4513'},
  {name:'czerwony', value:2, color:'red'},
  {name:'złoty', value:5, color:'gold'},
  {name:'srebrny', value:10, color:'silver'}
];

let bands = [1,0,0,1,5]; // startowe

const bandElements = document.querySelectorAll('.band');
const dropdown = document.getElementById('dropdown');

function render(){
  bandElements.forEach((el,i)=>{
    let arr = (i<3) ? digitColors : (i==3 ? multiplierColors : toleranceColors);
    let colorObj = arr.find(c=>c.value===bands[i]);
    el.style.background = colorObj.color;
  });

  let value = (bands[0]*100 + bands[1]*10 + bands[2]) * bands[3];
  let tol = bands[4];

  document.getElementById("result").innerText =
    `Rezystancja: ${value} Ω ±${tol}%`;
}

bandElements.forEach(el=>{
  el.onclick = (e)=>{
    let index = parseInt(el.dataset.index);
    showDropdown(e.target,index);
  };
});

function showDropdown(target,index){

  dropdown.innerHTML = "";

  let arr = (index<3) ? digitColors : (index==3 ? multiplierColors : toleranceColors);

  arr.forEach(c=>{
    let div = document.createElement("div");
    div.innerText = c.name;

    div.onclick = ()=>{
      bands[index] = c.value;
      dropdown.style.display = "none";
      render();
    };

    dropdown.appendChild(div);
  });

  let rect = target.getBoundingClientRect();
  dropdown.style.left = rect.left + "px";
  dropdown.style.top = rect.bottom + window.scrollY + "px";
  dropdown.style.display = "flex";
}

window.onclick = (e)=>{
  if(!e.target.classList.contains("band")){
    dropdown.style.display = "none";
  }
};

render();

</script>

</body>
</html>
