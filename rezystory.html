<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator rezystorów</title>

<style>
body{
  background:#2f3b3b;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container{
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
}

.box{
  background:#3d4b4b;
  padding:20px;
  border-radius:15px;
}

.resistor{
  width:400px;
  height:100px;
  background:#d9c69a;
  border-radius:30px;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.wire{
  width:150px;
  height:6px;
  background:black;
  position:absolute;
  top:50%;
}
.wire.left{ left:-150px; }
.wire.right{ right:-150px; }

.band{
  width:18px;
  height:80px;
  margin:0 5px;
  border:2px solid black;
  cursor:pointer;
}

.dropdown{
  position:absolute;
  background:white;
  color:black;
  display:none;
  flex-direction:column;
  border:1px solid #ccc;
  z-index:10;
}

.dropdown div{
  padding:5px;
  cursor:pointer;
}
.dropdown div:hover{
  background:#eee;
}

.result{
  font-size:22px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>Kalkulator kodów rezystorów</h1>

<div class="container">

<!-- ===== 5 PASKÓW ===== -->
<div class="box">
<h2>5 pasków</h2>

<div class="resistor" id="res5">
<div class="wire left"></div>

<div class="band" data-i="0"></div>
<div class="band" data-i="1"></div>
<div class="band" data-i="2"></div>
<div class="band" data-i="3"></div>
<div class="band" data-i="4"></div>

<div class="wire right"></div>
</div>

<div class="result" id="res5out"></div>
</div>

<!-- ===== 4 PASKI ===== -->
<div class="box">
<h2>4 paski</h2>

<div class="resistor" id="res4">
<div class="wire left"></div>

<div class="band" data-i="0"></div>
<div class="band" data-i="1"></div>
<div class="band" data-i="2"></div>
<div class="band" data-i="3"></div>

<div class="wire right"></div>
</div>

<div class="result" id="res4out"></div>
</div>

</div>

<div class="dropdown" id="dropdown"></div>

<script>

// ===== KOLORY =====
const digits = [
  {n:'czarny',v:0,c:'#000'},
  {n:'brązowy',v:1,c:'#8B4513'},
  {n:'czerwony',v:2,c:'red'},
  {n:'pomarańczowy',v:3,c:'orange'},
  {n:'żółty',v:4,c:'yellow'},
  {n:'zielony',v:5,c:'green'},
  {n:'niebieski',v:6,c:'blue'},
  {n:'fioletowy',v:7,c:'purple'},
  {n:'szary',v:8,c:'gray'},
  {n:'biały',v:9,c:'white'}
];

const mult = [
  {n:'czarny',v:1,c:'#000'},
  {n:'brązowy',v:10,c:'#8B4513'},
  {n:'czerwony',v:100,c:'red'},
  {n:'pomarańczowy',v:1000,c:'orange'},
  {n:'żółty',v:10000,c:'yellow'}
];

const tol = [
  {n:'brązowy',v:1,c:'#8B4513'},
  {n:'czerwony',v:2,c:'red'},
  {n:'złoty',v:5,c:'gold'},
  {n:'srebrny',v:10,c:'silver'}
];

// ===== 5 PASKÓW =====
let b5=[1,0,0,1,5];
const r5=document.querySelectorAll('#res5 .band');

function draw5(){
  r5.forEach((el,i)=>{
    let arr = (i<3)?digits:(i==3?mult:tol);
    el.style.background = arr.find(x=>x.v===b5[i]).c;
  });

  let val=(b5[0]*100+b5[1]*10+b5[2])*b5[3];
  document.getElementById('res5out').innerText =
    `Rezystancja: ${val} Ω ±${b5[4]}%`;
}

// ===== 4 PASKI =====
let b4=[1,0,1,5];
const r4=document.querySelectorAll('#res4 .band');

function draw4(){
  r4.forEach((el,i)=>{
    let arr = (i<2)?digits:(i==2?mult:tol);
    el.style.background = arr.find(x=>x.v===b4[i]).c;
  });

  let val=(b4[0]*10+b4[1])*b4[2];
  document.getElementById('res4out').innerText =
    `Rezystancja: ${val} Ω ±${b4[3]}%`;
}

// ===== DROPDOWN =====
const dropdown=document.getElementById('dropdown');

function openMenu(target,index,type){
  dropdown.innerHTML="";

  let arr;
  if(type=="5") arr=(index<3)?digits:(index==3?mult:tol);
  else arr=(index<2)?digits:(index==2?mult:tol);

  arr.forEach(c=>{
    let d=document.createElement("div");
    d.innerText=c.n;

    d.onclick=()=>{
      if(type=="5"){ b5[index]=c.v; draw5(); }
      else{ b4[index]=c.v; draw4(); }

      dropdown.style.display="none";
    };

    dropdown.appendChild(d);
  });

  let r=target.getBoundingClientRect();
  dropdown.style.left=r.left+"px";
  dropdown.style.top=(r.bottom+window.scrollY)+"px";
  dropdown.style.display="flex";
}

// kliknięcia
r5.forEach(el=>{
  el.onclick=e=>openMenu(e.target,el.dataset.i,"5");
});
r4.forEach(el=>{
  el.onclick=e=>openMenu(e.target,el.dataset.i,"4");
});

window.onclick=e=>{
  if(!e.target.classList.contains("band"))
    dropdown.style.display="none";
};

draw5();
draw4();

</script>

</body>
</html>
