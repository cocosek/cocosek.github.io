<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator rezystorów</title>

<style>
body{
  background:#2f3b3b;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* CONTAINER */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:120px; /* 🔥 większy odstęp */
    margin-top:30px;
}

/* BOX */
.box{
  background:#3d4b4b;
  padding:20px;
  border-radius:15px;
  width:380px;
}

/* OBRAZKI */
img{
  width:260px;
  margin:10px;
  border-radius:10px;
  box-shadow:0 0 15px black;
}

/* REZYSTOR */
.resistor{
    width:100%;
    max-width:360px; /* 🔥 mniejszy */
    height:120px;
    background:#d9c69a;
    border-radius:30px;
    margin:40px auto;
    display:flex;
    align-items:center;
    position:relative;
    padding:0 30px;
}

/* LEWE PASKI */
.bands-left{
    display:flex;
    gap:10px;
}

/* DRUTY */
.wire{
  width:50px; /* 🔥 krótsze */
  height:6px;
  background:black;
  position:absolute;
  top:50%;
  transform:translateY(-50%);
}

.wire.left{ left:-60px; }
.wire.right{ right:-60px; }

/* PASEK */
.band{
    width:18px;
    height:90px;
    border:2px solid black;
    cursor:pointer;
}

.band.last{
    margin-left:auto;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  background:white;
  color:black;
  display:none;
  flex-direction:column;
  border:1px solid #ccc;
  z-index:10;
}

.dropdown div{
  padding:5px;
  cursor:pointer;
}
.dropdown div:hover{
  background:#eee;
}

.result{
  font-size:22px;
  margin-top:10px;
}

/* TABELA */
table{
  margin:20px auto;
  border-collapse:collapse;
  background:white;
  color:black;
}

table td, table th{
  border:1px solid black;
  padding:6px 10px;
}
</style>
</head>

<body>

<h1>Kalkulator kodów rezystorów</h1>

<div class="container">

<!-- ===== 5 PASKÓW ===== -->
<div class="box">
<h2>5 pasków</h2>

<img src="rezystor5paskow.png">

<div class="resistor" id="res5">

  <div class="wire left"></div>

  <div class="bands-left">
    <div class="band" data-i="0"></div>
    <div class="band" data-i="1"></div>
    <div class="band" data-i="2"></div>
    <div class="band" data-i="3"></div>
  </div>

  <div class="band last" data-i="4"></div>

  <div class="wire right"></div>

</div>

<div class="result" id="res5out"></div>
</div>

<!-- ===== 4 PASKI ===== -->
<div class="box">
<h2>4 paski</h2>

<img src="rezystor4paski.png">

<div class="resistor" id="res4">

  <div class="wire left"></div>

  <div class="bands-left">
    <div class="band" data-i="0"></div>
    <div class="band" data-i="1"></div>
    <div class="band" data-i="2"></div>
  </div>

  <div class="band last" data-i="3"></div>

  <div class="wire right"></div>

</div>

<div class="result" id="res4out"></div>
</div>

</div>

<div class="dropdown" id="dropdown"></div>

<script>

const digits = [
  {n:'czarny',v:0,c:'#000'},
  {n:'brązowy',v:1,c:'#8B4513'},
  {n:'czerwony',v:2,c:'red'},
  {n:'pomarańczowy',v:3,c:'orange'},
  {n:'żółty',v:4,c:'yellow'},
  {n:'zielony',v:5,c:'green'},
  {n:'niebieski',v:6,c:'blue'},
  {n:'fioletowy',v:7,c:'purple'},
  {n:'szary',v:8,c:'gray'},
  {n:'biały',v:9,c:'white'}
];

const mult = [
  {n:'czarny',v:1,c:'#000'},
  {n:'brązowy',v:10,c:'#8B4513'},
  {n:'czerwony',v:100,c:'red'},
  {n:'pomarańczowy',v:1000,c:'orange'},
  {n:'żółty',v:10000,c:'yellow'},
  {n:'zielony',v:100000,c:'green'},
  {n:'niebieski',v:1000000,c:'blue'}
];

const tol = [
  {n:'brązowy',v:1,c:'#8B4513'},
  {n:'czerwony',v:2,c:'red'},
  {n:'złoty',v:5,c:'gold'},
  {n:'srebrny',v:10,c:'silver'}
];

let b5=[1,0,0,1,5];
let b4=[1,0,1,5];

const r5=document.querySelectorAll('#res5 .band');
const r4=document.querySelectorAll('#res4 .band');
const dropdown=document.getElementById('dropdown');

function format(val){
  if(val >= 1000000){
    return (val/1000000).toString().replace('.',',') + " MΩ";
  }
  else if(val >= 1000){
    return (val/1000).toString().replace('.',',') + " kΩ";
  }
  else{
    return val + " Ω";
  }
}

function draw5(){
  r5.forEach((el,i)=>{
    let arr = (i<3)?digits:(i==3?mult:tol);
    el.style.background = arr.find(x=>x.v===b5[i]).c;
  });

  let val=(b5[0]*100+b5[1]*10+b5[2])*b5[3];

  document.getElementById('res5out').innerText =
    `Rezystancja: ${format(val)} ±${b5[4]}%`;
}

function draw4(){
  r4.forEach((el,i)=>{
    let arr = (i<2)?digits:(i==2?mult:tol);
    el.style.background = arr.find(x=>x.v===b4[i]).c;
  });

  let val=(b4[0]*10+b4[1])*b4[2];

  document.getElementById('res4out').innerText =
    `Rezystancja: ${format(val)} ±${b4[3]}%`;
}

function openMenu(target,index,type){
  dropdown.innerHTML="";

  let arr;
  if(type=="5") arr=(index<3)?digits:(index==3?mult:tol);
  else arr=(index<2)?digits:(index==2?mult:tol);

  arr.forEach(c=>{
    let d=document.createElement("div");
    d.innerText=c.n;

    d.onclick=()=>{
      if(type=="5"){ b5[index]=c.v; draw5(); }
      else{ b4[index]=c.v; draw4(); }
      dropdown.style.display="none";
    };

    dropdown.appendChild(d);
  });

  let r=target.getBoundingClientRect();
  dropdown.style.left=r.left+"px";
  dropdown.style.top=(r.bottom+window.scrollY)+"px";
  dropdown.style.display="flex";
}

r5.forEach(el=>{
  el.onclick=e=>openMenu(e.target,el.dataset.i,"5");
});
r4.forEach(el=>{
  el.onclick=e=>openMenu(e.target,el.dataset.i,"4");
});

window.onclick=e=>{
  if(!e.target.classList.contains("band"))
    dropdown.style.display="none";
};

draw5();
draw4();

</script>

</body>
</html>
