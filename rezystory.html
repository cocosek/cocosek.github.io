<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator rezystorów</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#eee;
}

/* REZYSTOR */
.resistor{
    width:500px;
    height:120px;
    background:#d9c69a;
    border-radius:30px;
    margin:40px auto;
    display:flex;
    align-items:center;
    position:relative;
    padding:0 20px;
}

/* DRUTY */
.wire{
    width:150px;
    height:6px;
    background:black;
    position:absolute;
    top:50%;
}

.left{ left:-150px; }
.right{ right:-150px; }

/* LEWE PASKI */
.bands-left{
    display:flex;
}

/* PASKI */
.band{
    width:20px;
    height:90px;
    margin-right:10px;
    border:1px solid black;
    cursor:pointer;
}

/* OSTATNI PASEK */
.band.last{
    margin-left:auto;
}

/* DROPDOWN */
.dropdown{
    position:absolute;
    background:white;
    border:1px solid black;
    display:none;
    flex-direction:column;
    z-index:100;
}

.dropdown div{
    padding:5px;
    cursor:pointer;
}

.dropdown div:hover{
    background:#ddd;
}

.result{
    font-size:26px;
    margin-top:10px;
    font-weight:bold;
}

.box{
    margin-bottom:80px;
}
</style>

</head>
<body>

<h1>Kalkulator kodów rezystorów</h1>

<!-- ===== 4 PASKI ===== -->
<div class="box">
<h2>Rezystor 4-paskowy</h2>

<div class="resistor" id="res4">
    <div class="wire left"></div>

    <div class="bands-left">
        <div class="band" data-i="0"></div>
        <div class="band" data-i="1"></div>
        <div class="band" data-i="2"></div>
    </div>

    <div class="band last" data-i="3"></div>

    <div class="wire right"></div>
</div>

<div class="result" id="res4val"></div>
</div>


<!-- ===== 5 PASKÓW ===== -->
<div class="box">
<h2>Rezystor 5-paskowy</h2>

<div class="resistor" id="res5">
    <div class="wire left"></div>

    <div class="bands-left">
        <div class="band" data-i="0"></div>
        <div class="band" data-i="1"></div>
        <div class="band" data-i="2"></div>
        <div class="band" data-i="3"></div>
    </div>

    <div class="band last" data-i="4"></div>

    <div class="wire right"></div>
</div>

<div class="result" id="res5val"></div>
</div>


<div class="dropdown" id="dropdown"></div>

<script>

const colors = [
 {name:"Czarny", val:0, col:"black"},
 {name:"Brązowy", val:1, col:"#8B4513"},
 {name:"Czerwony", val:2, col:"red"},
 {name:"Pomarańczowy", val:3, col:"orange"},
 {name:"Żółty", val:4, col:"yellow"},
 {name:"Zielony", val:5, col:"green"},
 {name:"Niebieski", val:6, col:"blue"},
 {name:"Fioletowy", val:7, col:"purple"},
 {name:"Szary", val:8, col:"gray"},
 {name:"Biały", val:9, col:"white"}
];

const mult = [
 {name:"x1", val:1},
 {name:"x10", val:10},
 {name:"x100", val:100},
 {name:"x1k", val:1000},
 {name:"x10k", val:10000},
 {name:"x100k", val:100000},
 {name:"x1M", val:1000000}
];

const tol = [
 {name:"±1%", val:1, col:"#8B4513"},
 {name:"±2%", val:2, col:"red"},
 {name:"±5%", val:5, col:"gold"},
 {name:"±10%", val:10, col:"silver"}
];

let r4 = [1,0,1,5];
let r5 = [1,0,0,1,5];

const dropdown = document.getElementById("dropdown");

function format(v){
 if(v>=1000000) return (v/1000000)+" MΩ";
 if(v>=1000) return (v/1000)+" kΩ";
 return v+" Ω";
}

function draw(){

 // 4 paski
 document.querySelectorAll("#res4 .band").forEach((b,i)=>{
   if(i<2){
     let c = colors.find(x=>x.val==r4[i]);
     b.style.background=c.col;
   }
   else if(i==2){
     b.style.background="orange";
   }
   else{
     let t = tol.find(x=>x.val==r4[3]);
     b.style.background=t.col;
   }
 });

 let val4 = (r4[0]*10 + r4[1]) * 10;
 document.getElementById("res4val").innerText =
 format(val4) + " " + tol.find(x=>x.val==r4[3]).name;


 // 5 pasków
 document.querySelectorAll("#res5 .band").forEach((b,i)=>{
   if(i<3){
     let c = colors.find(x=>x.val==r5[i]);
     b.style.background=c.col;
   }
   else if(i==3){
     b.style.background="brown";
   }
   else{
     let t = tol.find(x=>x.val==r5[4]);
     b.style.background=t.col;
   }
 });

 let val5 = (r5[0]*100 + r5[1]*10 + r5[2]) * 10;
 document.getElementById("res5val").innerText =
 format(val5) + " " + tol.find(x=>x.val==r5[4]).name;
}


function show(el, type, index){

 dropdown.innerHTML="";

 let list = colors;

 if(type=="mult") list = mult;
 if(type=="tol") list = tol;

 list.forEach(item=>{
   let d = document.createElement("div");
   d.innerText = item.name;

   d.onclick=()=>{
     if(el.closest("#res4")){
       if(type=="digit") r4[index]=item.val;
       if(type=="tol") r4[3]=item.val;
     } else {
       if(type=="digit") r5[index]=item.val;
       if(type=="tol") r5[4]=item.val;
     }
     dropdown.style.display="none";
     draw();
   };

   dropdown.appendChild(d);
 });

 let r = el.getBoundingClientRect();
 dropdown.style.left = r.left+"px";
 dropdown.style.top = (r.bottom+window.scrollY)+"px";
 dropdown.style.display="flex";
}


// kliknięcia
document.querySelectorAll(".band").forEach(b=>{
 b.onclick = (e)=>{

   let i = parseInt(b.dataset.i);

   if(b.closest("#res4")){
     if(i<2) show(b,"digit",i);
     else if(i==3) show(b,"tol",i);
   }
   else{
     if(i<3) show(b,"digit",i);
     else if(i==4) show(b,"tol",i);
   }

   e.stopPropagation();
 };
});

window.onclick = ()=> dropdown.style.display="none";

draw();

</script>

</body>
</html>
